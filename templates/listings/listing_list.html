{% extends 'base.html' %}
{% block content %}
<h1>Listings</h1>
{% for listing in listings %}
    <div class="card">
        <h2><a href="{% url 'listing_detail' listing.pk %}">{{ listing.title }}</a></h2>
        <p><strong>${{ listing.price }}</strong> · posted by {{ listing.owner.username }}</p>
        <p>{{ listing.description|truncatewords:25 }}</p>
    </div>
{% empty %}
    <p>No listings yet.</p>
{% endfor %}
{% endblock %}
