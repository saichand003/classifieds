<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifieds</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem auto; max-width: 900px; }
        nav a { margin-right: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'listing_list' %}">Listings</a>
    {% if user.is_authenticated %}
        <a href="{% url 'create_listing' %}">New Listing</a>
        <a href="{% url 'inbox' %}">Chat</a>
        <a href="{% url 'profile' %}">Profile</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
    {% endif %}
</nav>
<hr>
{% block content %}{% endblock %}
</body>
</html>
