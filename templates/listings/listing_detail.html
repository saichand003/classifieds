{% extends 'base.html' %}
{% block content %}
<article class="card">
    <h1>{{ listing.title }}</h1>
    <p><strong>${{ listing.price }}</strong></p>
    <p>{{ listing.description }}</p>
    {% if listing.image %}
        <img src="{{ listing.image.url }}" alt="{{ listing.title }}">
    {% endif %}
    <p>Owner: {{ listing.owner.username }}</p>
</article>
{% if user.is_authenticated and user != listing.owner %}
    <p><a href="{% url 'conversation' listing.owner.id %}">Message seller</a></p>
{% endif %}
{% endblock %}
