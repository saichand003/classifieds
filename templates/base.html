<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityConnect Classifieds</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0 auto; max-width: 1000px; padding: 1rem; }
        nav { display:flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        nav a { text-decoration: none; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .muted { color:#666; }
        .badge { background:#eef; border-radius:999px; padding:0.2rem 0.6rem; font-size:0.8rem; }
        .featured { border-color:#4a69ff; box-shadow:0 0 0 1px #4a69ff inset; }
        .hero { background:#f6f8ff; border-radius:8px; padding:1rem; margin:1rem 0; }
        .messages { list-style:none; padding:0; }
        .messages li { background:#eaf8e8; padding:0.6rem; border-radius:6px; margin:0.5rem 0; }
        img { max-width:100%; height:auto; border-radius: 6px; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'listing_list' %}"><strong>CityConnect</strong></a>
    <a href="{% url 'create_listing' %}">Post Ad</a>
    <a href="{% url 'inbox' %}">Messages</a>
    {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">Profile</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
    {% endif %}
</nav>
<hr>
{% if messages %}
    <ul class="messages">
    {% for message in messages %}
        <li>{{ message }}</li>
    {% endfor %}
    </ul>
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
